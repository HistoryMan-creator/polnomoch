<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Тренажер: Органы власти РФ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a; /* slate-900 */
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #f1f5f9; /* slate-100 */
        }
        
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            position: relative;
            overflow-y: auto; 
            overflow-x: hidden;
        }

        /* Эффект тёмного матового стекла */
        .glass-card {
            background: rgba(30, 41, 59, 0.6); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
        }

        /* Анимации карточек */
        .card-enter { animation: slideIn 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .card-exit { animation: slideOut 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        @keyframes slideIn {
            from { transform: translateX(100%) scale(0.95); opacity: 0; }
            to { transform: translateX(0) scale(1); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0) scale(1); opacity: 1; }
            to { transform: translateX(-100%) scale(0.95); opacity: 0; }
        }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        .pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        .btn-option { transition: transform 0.15s ease-out, border-color 0.15s ease, background-color 0.15s ease, box-shadow 0.15s ease; }
        .btn-option:active { transform: scale(0.94); }
        .progress-bar-fill { transition: width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .dot { transition: background-color 0.2s ease; }

        .bg-blob {
            position: absolute;
            filter: blur(60px);
            opacity: 0.25;
            z-index: 0;
            border-radius: 50%;
        }
        
        .override-success {
            background-color: rgba(16, 185, 129, 0.15) !important;
            border-color: #10b981 !important;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2) inset !important;
        }
        .override-success span.font-bold { color: #34d399 !important; }
        
        .override-error {
            background-color: rgba(244, 63, 94, 0.15) !important;
            border-color: #f43f5e !important;
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.2) inset !important;
        }
        .override-error span.font-bold { color: #fb7185 !important; }

        /* ========================================= */
        /* СТИЛИ ДЛЯ АНИМАЦИИ (ИЗ ВАШЕГО КОДА)     */
        /* ========================================= */
        :root {
            --bg-color: #f1f5f9;
            --board-bg: #166534;
            --board-border: #451a03;
            --desk-color: #92400e;
            --teacher-skin: #fed7aa;
            --teacher-hair: #d97706;
            --teacher-suit: #475569;
            --student-skin: #ffedd5;
            --student-shirt: #f8fafc;
            --student-vest: #1e293b;
            --student-pants: #1d4ed8;
            --mom-dress: #be185d;
        }

        #animation-container {
            width: 100%;
            max-width: 1000px;
            height: auto;
            aspect-ratio: 10 / 6;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            position: relative;
        }

        #animation-container svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* --- СОСТОЯНИЯ УЧЕНИКА --- */
        .student-upright {
            transform-origin: 640px 360px;
            transform: rotate(90deg);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .student-falling {
            transform-origin: 640px 360px;
            transform: rotate(0deg);
            transition: transform 0.4s cubic-bezier(0.5, 0, 1, 1);
        }

        /* --- АНИМАЦИИ НОГ --- */
        .legs-upright {
            transform: translate(-25px, -15px);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .legs-falling {
            transform: translate(0, 0);
            transition: transform 0.4s cubic-bezier(0.5, 0, 1, 1);
        }

        .student-flinch {
            transform-origin: 660px 360px;
            transition: transform 0.1s ease-out;
        }

        .flinch-active {
            transform: translate(10px, 5px) rotate(4deg) !important;
        }

        /* --- АНИМАЦИИ --- */
        .arm-swing {
            transform-origin: 340px 240px;
            transition: transform 0.1s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .mom-arm-swing {
            transform-origin: 170px 220px;
            transition: transform 0.15s ease-out;
        }

        .impact-effect {
            opacity: 0;
            transition: opacity 0.05s;
            transform-origin: 660px 370px;
        }

        .impact-active { opacity: 1; }

        .float-up {
            animation: floatUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            pointer-events: none;
            text-shadow: 2px 2px 0px #fff, -2px -2px 0px #fff, 2px -2px 0px #fff, -2px 2px 0px #fff;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
        }

        .float-money {
            animation: floatUpMoney 1s ease-out forwards;
            pointer-events: none;
            font-weight: bold;
            fill: #15803d;
            font-size: 20px;
            text-shadow: 1px 1px 0px #fff, -1px -1px 0px #fff, 1px -1px 0px #fff, -1px 1px 0px #fff;
        }

        @keyframes floatUpMoney {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-60px); }
        }

        .money-drop { animation: moneyFall 0.2s ease-in forwards; }
        @keyframes moneyFall {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(115px); opacity: 1; }
        }

        .score-pulse { animation: pulseScore 0.5s infinite alternate; }
        @keyframes pulseScore {
            from { transform: scale(1); filter: drop-shadow(0 0 5px #facc15); }
            to { transform: scale(1.1); filter: drop-shadow(0 0 15px #facc15); }
        }
        
        .score-text-origin { transform-origin: 580px 200px; }

        /* Облачка с текстом */
        .speech-bubble {
            opacity: 0;
            transform: scale(0.8) translateY(10px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        #teacher-speech-bubble { transform-origin: 290px 180px; }
        #mom-speech-bubble { transform-origin: 160px 135px; }

        .speech-active {
            opacity: 1 !important;
            transform: scale(1) translateY(0) !important;
        }

        .ride-away { animation: rideBike 2s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes rideBike {
            0% { transform: translateX(0); }
            10% { transform: translateX(-30px); } 
            100% { transform: translateX(1000px); }
        }

        .spin-wheel { animation: spinWheel 0.4s linear infinite; }
        @keyframes spinWheel {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Анимация махания рукой на прощание */
        .wave-arm {
            animation: waveArm 0.3s ease-in-out infinite alternate !important;
            transform-origin: 340px 240px;
        }
        @keyframes waveArm {
            0% { transform: rotate(-80deg); }
            100% { transform: rotate(-20deg); }
        }
    </style>
</head>
<body class="antialiased selection:bg-indigo-500/30">

        <!-- Декоративные неоновые пятна на фоне -->

        <!-- START SCREEN -->

            { id: 76, text: "Представляет Совету Федерации кандидатуры для назначения на должность Председателя Счетной палаты и половины от общего числа аудиторов Счетной палаты", type: "p" },
            { id: 77, text: "Представляет Государственной Думе кандидатуры для назначения на должность заместителя Председателя Счетной палаты и половины от общего числа аудиторов Счетной палаты", type: "p" },
            { id: 78, text: "Назначает на должность после консультаций с Советом Федерации и освобождает от должности руководителей федеральных органов исполнительной власти (включая федеральных министров), ведающих вопросами обороны, безопасности государства, внутренних дел, юстиции, иностранных дел, предотвращения чрезвычайных ситуаций и ликвидации последствий стихийных бедствий, общественной безопасности", type: "p" }
        ];

        let activePool = [];
        let currentQuestion = null;
        let totalQuestionsCount = 0;
        let masteredQuestionsCount = 0;
        let isAnswering = false; 

        const screenStart = document.getElementById('screen-start');
        const screenQuiz = document.getElementById('screen-quiz');
        const questionText = document.getElementById('question-text');
        const questionCard = document.getElementById('question-card');
        const masteredCounter = document.getElementById('mastered-counter');
        const poolCounter = document.getElementById('pool-counter');
        const progressBar = document.getElementById('progress-bar');
        const dotsContainer = document.getElementById('streak-dots');

        document.getElementById('start-total').textContent = `${dbQuestions.length} карточек`;

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function startGame() {
            activePool = dbQuestions.map(q => ({ 
                ...q, 
                streak: 0,
                targetStreak: 2 
            }));
            shuffle(activePool);
            
            totalQuestionsCount = activePool.length;
            masteredQuestionsCount = 0;
            
            screenStart.classList.add('hidden');
            screenQuiz.classList.remove('hidden');
            screenQuiz.classList.add('flex');
            
            showNextQuestion();
        }

        function renderDots(streak, targetStreak, isError = false) {
            dotsContainer.innerHTML = '';
            for (let i = 0; i < targetStreak; i++) {
                const dot = document.createElement('div');
                let bgClass = 'bg-slate-700'; 
                let extraClass = '';
                
                if (isError) {
                    if (i === 0) bgClass = 'bg-rose-500 pop shadow-[0_0_8px_rgba(244,63,94,0.8)]';
                } else if (i < streak) {
                    bgClass = 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]';
                    if (i === streak - 1 && streak > 0) {
                        extraClass = 'pop';
                    }
                }
                
                dot.className = `dot w-3 h-3 rounded-full ${bgClass} ${extraClass}`;
                dotsContainer.appendChild(dot);
            }
        }

        function flashErrorAndResetDots() {
            renderDots(0, currentQuestion.targetStreak, true);
            setTimeout(() => {
                if (currentQuestion) {
                    renderDots(0, currentQuestion.targetStreak, false);
                }
            }, 500);
        }

        function showNextQuestion() {
            if (activePool.length === 0) {
                endGame();
                return;
            }

            currentQuestion = activePool.shift();
            questionText.textContent = currentQuestion.text;
            
            questionText.className = "font-medium text-slate-100 leading-snug tracking-tight mt-2";
            
            if (currentQuestion.text.length > 200) {
                questionText.classList.add('text-[13px]', 'md:text-[14px]');
            } else if (currentQuestion.text.length > 100) {
                questionText.classList.add('text-[15px]', 'md:text-[17px]');
            } else {
                questionText.classList.add('text-[18px]', 'md:text-[20px]');
            }
            
            renderDots(currentQuestion.streak, currentQuestion.targetStreak);
            
            masteredCounter.textContent = `Выучено: ${masteredQuestionsCount}/${totalQuestionsCount}`;
            poolCounter.textContent = `В колоде: ${activePool.length + 1}`;
            
            const progress = (masteredQuestionsCount / totalQuestionsCount) * 100;
            progressBar.style.width = `${progress}%`;

            questionCard.classList.remove('card-exit');
            questionCard.classList.add('card-enter');
            
            isAnswering = false;
        }

        function reinsertIntoPool(question) {
            if (activePool.length === 0) {
                activePool.push(question);
            } else {
                const minIdx = Math.min(3, activePool.length);
                const insertIdx = Math.floor(Math.random() * (activePool.length - minIdx + 1)) + minIdx;
                activePool.splice(insertIdx, 0, question);
            }
        }

        function checkAnswer(selectedType, btnElement) {
            if (isAnswering) return;
            isAnswering = true;

            const isCorrect = selectedType === currentQuestion.type;
            const correctBtn = document.querySelector(`button[data-type="${currentQuestion.type}"]`);

            if (isCorrect) {
                currentQuestion.streak++;
                btnElement.classList.add('override-success');
                renderDots(currentQuestion.streak, currentQuestion.targetStreak);

                if (currentQuestion.streak >= currentQuestion.targetStreak) {
                    masteredQuestionsCount++;
                } else {
                    reinsertIntoPool(currentQuestion);
                }
                
                setTimeout(() => {
                    btnElement.classList.remove('override-success');
                    moveToNextCard();
                }, 600);

            } else {
                currentQuestion.streak = 0;
                currentQuestion.targetStreak = 3; 
                
                btnElement.classList.add('override-error');
                if (correctBtn) correctBtn.classList.add('override-success');
                
                questionCard.classList.add('shake');
                flashErrorAndResetDots();
                reinsertIntoPool(currentQuestion);
                
                setTimeout(() => {
                    btnElement.classList.remove('override-error');
                    if (correctBtn) correctBtn.classList.remove('override-success');
                    moveToNextCard();
                }, 1800); 
            }
        }

        function moveToNextCard() {
            questionCard.classList.remove('shake');
            questionCard.classList.remove('card-enter');
            questionCard.classList.add('card-exit');

            setTimeout(() => {
                showNextQuestion();
            }, 300);
        }

        function endGame() {
            screenQuiz.classList.add('hidden');
            screenQuiz.classList.remove('flex');
            
            const screenAnim = document.getElementById('screen-animation');
            screenAnim.classList.remove('hidden');
            screenAnim.classList.add('flex');
            
            // Включаем музыку на фоне
            const music = document.getElementById('victory-music');
            music.volume = 0.9;
            music.play().catch(e => console.log("Audio failed to auto-play:", e));
            
            // Запускаем сюжетный скрипт
            startVictoryAnimation();
        }

        // ============================================
        // ЛОГИКА АНИМАЦИИ (ИЗ ВАШЕГО КОДА ТОЧЬ-В-ТОЧЬ)
        // ============================================
        function startVictoryAnimation() {
            const arm = document.getElementById('arm-group');
            const teacherWrapper = document.getElementById('teacher-wrapper');
            const studentDesk = document.getElementById('student');
            const studentBody = document.getElementById('student-upper');
            const studentLegs = document.getElementById('student-legs');
            const impactEffect = document.getElementById('impact');
            const scoreVal = document.getElementById('score-val');
            const scene = document.getElementById('scene');
            
            const bikerGroup = document.getElementById('biker-group');
            const wheels = document.querySelectorAll('.wheel');

            const teacherSpeech = document.getElementById('teacher-speech-bubble');
            const speechText = document.getElementById('speech-text');
            const momSpeech = document.getElementById('mom-speech-bubble');

            const momArm = document.getElementById('mother-arm');
            const momMoneyInHand = document.getElementById('mom-money-in-hand');
            const moneyPileGroup = document.getElementById('money-pile-group');

            const phrases = [
                "Тяжело в учении - легко в бою!", "А голову ты дома не забыл?!", "Минус балл за осанку!", "Это база!",
                "Где твоя сменка?!", "Звонок для учителя!", "Выйди и зайди нормально!", "Лес рук!",
                "Оценку я буду на двоих ставить?", "А ну, расскажи всем, вместе посмеемся!", "Камчатка, я вам не мешаю?",
                "Достаем двойные листочки!", "Ну раз добровольцев нет, открываю журнал...", "Я кому тут распинаюсь?",
                "Спрос рождает предложение, а ремень - знания!", "Инфляция твоих оценок пробила дно!",
                "Где твоя социальная мобильность?!", "Твой социальный статус сейчас - двоечник!",
                "Познание начинается с боли!", "Твои знания абсолютно неликвидны!", "Назови признаки государства!"
            ];
            
            let animScore = 0;
            let speechTimeout;
            let isSequenceActive = true; 

            function spawnPlusOne() {
                const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                txt.textContent = "+1";
                txt.setAttribute("x", "680");
                txt.setAttribute("y", "350");
                txt.setAttribute("fill", "#22c55e");
                txt.setAttribute("font-size", "45");
                txt.setAttribute("font-weight", "bold");
                txt.classList.add("float-up");
                scene.appendChild(txt);
                setTimeout(() => txt.remove(), 800);
            }

            // --- СЮЖЕТНОЕ ВСТУПЛЕНИЕ ---
            function runIntroSequence() {
                isSequenceActive = true;
                
                // 1. Ученик стоит (анатомически правильно)
                studentBody.setAttribute('class', 'student-upright');
                studentLegs.setAttribute('class', 'legs-upright');
                
                // 2. Учитель повернут к маме
                teacherWrapper.style.transform = 'scaleX(-1)';
                
                // 3. Мама говорит фразу (Ускоренные таймеры)
                setTimeout(() => {
                    momSpeech.classList.add('speech-active');
                }, 400);

                setTimeout(() => {
                    momSpeech.classList.remove('speech-active');
                }, 2800);

                // 4. Ученик послушно ложится на парту
                setTimeout(() => {
                    studentBody.setAttribute('class', 'student-falling');
                    studentLegs.setAttribute('class', 'legs-falling');
                }, 3200);

                // 5. Учитель разворачивается к ученику
                setTimeout(() => {
                    teacherWrapper.style.transform = 'scaleX(1)';
                }, 3700);

                // 6. Начинаем интенсив!
                setTimeout(() => {
                    studentBody.setAttribute('class', 'student-flinch'); 
                    isSequenceActive = false;
                    animationLoop();
                }, 4100);
            }

            // --- ИНТЕНСИВ (Удары) ---
            function animationLoop() {
                if (isSequenceActive) return;

                arm.style.transform = 'rotate(-55deg)';
                arm.style.transitionDuration = '0.3s';
                arm.style.transitionTimingFunction = 'ease-out';

                setTimeout(() => {
                    arm.style.transform = 'rotate(23deg)';
                    arm.style.transitionDuration = '0.08s';
                    arm.style.transitionTimingFunction = 'cubic-bezier(0.1, 0.9, 0.2, 1)';

                    setTimeout(() => {
                        impactEffect.classList.add('impact-active');
                        studentBody.classList.add('flinch-active');

                        // АНИМАЦИЯ ДЕНЕГ
                        momArm.style.transform = 'rotate(10deg)';
                        setTimeout(() => {
                            momMoneyInHand.style.display = 'none';

                            const note = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                            note.setAttribute("x", "225");
                            note.setAttribute("y", "255");
                            note.setAttribute("width", "35");
                            note.setAttribute("height", "16");
                            note.setAttribute("fill", "#86efac");
                            note.setAttribute("stroke", "#166534");
                            note.setAttribute("stroke-width", "1.5");
                            note.setAttribute("rx", "2");
                            note.classList.add("money-drop");
                            scene.appendChild(note);

                            const txtMoney = document.createElementNS("http://www.w3.org/2000/svg", "text");
                            txtMoney.textContent = "+5000₽";
                            txtMoney.setAttribute("x", "210");
                            txtMoney.setAttribute("y", "240");
                            txtMoney.classList.add("float-money");
                            scene.appendChild(txtMoney);
                            setTimeout(() => txtMoney.remove(), 1000);

                            setTimeout(() => {
                                note.classList.remove("money-drop");
                                let offset = Math.min(animScore * 1.5, 45); 
                                let rot = (Math.random() - 0.5) * 40;
                                note.setAttribute("y", 370 - offset);
                                note.setAttribute("x", 235 + (Math.random() - 0.5) * 15);
                                note.setAttribute("transform", `rotate(${rot}, 250, ${370 - offset})`);
                                moneyPileGroup.appendChild(note);

                                momArm.style.transform = 'rotate(-30deg)';
                                setTimeout(() => {
                                    momMoneyInHand.style.display = 'block'; 
                                }, 120);
                            }, 200);

                        }, 80);

                        animScore++;

                        if (animScore < 100 && Math.random() > 0.6) {
                            speechText.textContent = phrases[Math.floor(Math.random() * phrases.length)];
                            teacherSpeech.classList.add('speech-active');
                            clearTimeout(speechTimeout);
                            speechTimeout = setTimeout(() => {
                                teacherSpeech.classList.remove('speech-active');
                            }, 1400);
                        }

                        if (animScore === 100) {
                            scoreVal.textContent = animScore;
                            scoreVal.setAttribute("fill", "#facc15");
                            document.querySelector('.score-text-origin').classList.add("score-pulse");
                            spawnPlusOne();

                            isSequenceActive = true; 

                            setTimeout(() => {
                                studentDesk.style.display = 'none';
                                bikerGroup.style.display = 'block';
                                
                                bikerGroup.classList.add('ride-away');
                                wheels.forEach(w => w.classList.add('spin-wheel'));

                                // Учитель машет рукой
                                arm.style.transform = ''; 
                                arm.classList.add('wave-arm'); 

                                speechText.textContent = "В добрый путь, падаван!";
                                teacherSpeech.classList.add('speech-active');
                                clearTimeout(speechTimeout);
                                speechTimeout = setTimeout(() => {
                                    teacherSpeech.classList.remove('speech-active');
                                }, 2200);

                                setTimeout(() => {
                                    // СБРОС И ЗАПУСК СЦЕНЫ СНАЧАЛА
                                    animScore = 0;
                                    scoreVal.textContent = animScore;
                                    scoreVal.setAttribute("fill", "#4ade80");
                                    document.querySelector('.score-text-origin').classList.remove("score-pulse");
                                    moneyPileGroup.innerHTML = '';

                                    arm.classList.remove('wave-arm');

                                    bikerGroup.style.display = 'none';
                                    bikerGroup.classList.remove('ride-away');
                                    wheels.forEach(w => w.classList.remove('spin-wheel'));
                                    
                                    studentDesk.style.display = 'block';
                                    
                                    runIntroSequence();
                                }, 2400);

                            }, 600);

                        } else {
                            scoreVal.textContent = animScore;
                            spawnPlusOne();
                        }

                        setTimeout(() => {
                            impactEffect.classList.remove('impact-active');
                            studentBody.classList.remove('flinch-active');
                        }, 120);

                        if (!isSequenceActive) {
                            setTimeout(animationLoop, 680); // Ускорено на 20%
                        }

                    }, 80);

                }, 400);
            }

            runIntroSequence();
        }
    </script>
</body>
</html>
